apiVersion: v1
kind: ConfigMap
metadata:
  name: musify-config
  namespace: musify
data:
  API_URL: "https://api.musify.example.com"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: musify-secrets
  namespace: musify
type: Opaque
data:
  # Base64 encoded values
  SPOTIFY_CLIENT_ID: <base64-encoded-client-id>
  SPOTIFY_CLIENT_SECRET: <base64-encoded-client-secret>
  JWT_SECRET: <base64-encoded-jwt-secret>
